<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes on modal truncation</title>
  <style>
  .diagram-container {
    max-width: 100%;
    margin: 1.5rem 0;
    border: 1px solid #ccc;
    background: white;
  }
  </style>
</head>
<body>

<h1>Whatever blah blah blah</h1>



<div class="diagram-container">
  <object
    id="modal-diagram"
    type="image/svg+xml"
    data="/figures/Vision.excalidraw.svg"
    width="100%"
    height="500">
  </object>
</div>


<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>



<script>
  document.getElementById('modal-diagram')
    .addEventListener('load', function () {

      svgPanZoom(this, {
        zoomEnabled: true,
        panEnabled: true,
        controlIconsEnabled: true,
        fit: true,
        center: true,
        minZoom: 0.5,
        maxZoom: 10
      });

    });
</script>




</body>


</html>
